name: AA293 Flight Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '30 16 * * *'   # 10:00 PM IST  — Pre-departure
    - cron: '30 19 * * *'   #  1:00 AM IST  — Post-departure
    - cron: '0 11  * * *'   #  6:00 AM EST  — In-flight
    - cron: '10 12 * * *'   #  7:10 AM EST  — Arrival

jobs:
  check-flight:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine check label
        id: label
        run: |
          HOUR=$(date -u +"%H")
          if   [ "$HOUR" = "16" ]; then echo "label=🕐 10 PM IST — Pre-Departure"    >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "19" ]; then echo "label=🛫 Post-Departure Check"          >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "11" ]; then echo "label=✈️  6 AM EST — In-Flight Status"  >> $GITHUB_OUTPUT
          else                          echo "label=🛬 7:10 AM EST — Arrival Check"   >> $GITHUB_OUTPUT
          fi

      - name: Check flight & send email
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:        ${{ secrets.GMAIL_PASS }}
        run: python check_flight.py "${{ steps.label.outputs.label }}"
