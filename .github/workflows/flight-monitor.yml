name: AA293 Flight Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4  * * *'   # 10:00 AM IST (4:30 UTC)  — Morning check
    - cron: '30 18 * * *'   # 12:00 AM IST (18:30 UTC) — Midnight check
    - cron: '0 11  * * *'   #  6:00 AM EST (11:00 UTC) — In-flight check
    - cron: '0 12  * * *'   #  7:00 AM EST (12:00 UTC) — Arrival check

jobs:
  check-flight:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine check label
        id: label
        run: |
          HOUR=$(date -u +"%H")
          if   [ "$HOUR" = "04" ]; then echo "label=🌅 10 AM IST — Morning Check"    >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ]; then echo "label=🌙 12 AM IST — Midnight Check"   >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "11" ]; then echo "label=✈️  6 AM EST — In-Flight Check"  >> $GITHUB_OUTPUT
          else                          echo "label=🛬 7 AM EST — Arrival Check"     >> $GITHUB_OUTPUT
          fi

      - name: Check flight & send email
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:        ${{ secrets.GMAIL_PASS }}
        run: python check_flight.py "${{ steps.label.outputs.label }}"
